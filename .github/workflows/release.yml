name: Release Fiden Entity Vocabulary

on:
  push:
    tags:
      - "fide-vocabulary-v*"

permissions:
  contents: write
  id-token: write
  deployments: write

jobs:
  publish-fide-vocabulary:
    permissions:
      contents: write
      id-token: write
      deployments: write
    uses: ChrisLally/lally-workflows/.github/workflows/release-publish.yml@main
    with:
      tag_prefix: "fide-vocabulary-v"
      install_working_directory: "sdk/javascript"
      package_dir: "sdk/javascript"
      deployment_environment: "Preview - fide-vocabulary"
